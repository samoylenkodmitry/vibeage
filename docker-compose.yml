services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports: ['127.0.0.1:5432:5432']   # Local access only for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: postgres
    volumes:
      - ./scripts/auto-migrate.sh:/auto-migrate.sh:ro
      - ./scripts/migrations:/migrations:ro
    command: ["/bin/sh", "/auto-migrate.sh"]
    restart: "no"

  game:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${SERVER_DATABASE_URL:-postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vibeage.eu}
      MAX_HTTP_BUFFER_SIZE: ${MAX_HTTP_BUFFER_SIZE:-1048576}
      NODE_ENV: production
      PORT: 3001
      # /runtimez is not exposed publicly through Nginx; default to disabled so
      # the production guardrail accepts the deploy. To enable the metrics
      # endpoint, set both RUNTIMEZ_DISABLE=0 and RUNTIMEZ_TOKEN=<secret> on
      # the host — unsetting RUNTIMEZ_DISABLE falls back to "1" here.
      RUNTIMEZ_DISABLE: ${RUNTIMEZ_DISABLE:-1}
      RUNTIMEZ_TOKEN: ${RUNTIMEZ_TOKEN:-}
      # PR I: HMAC secret for signing session tokens. Auto-generated by
      # scripts/deploy-from-local.sh when not already set on the VPS.
      # 32+ bytes required (productionEnvAssertions enforces).
      VIBEAGE_AUTH_SECRET: ${VIBEAGE_AUTH_SECRET:-}
    ports: ['127.0.0.1:3001:3001']   # Nginx is the only public entrypoint
    restart: unless-stopped

volumes:
  dbdata:
