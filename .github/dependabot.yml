version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:00"
      timezone: "Europe/Belgrade"
    rebase-strategy: "disabled"
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "@colyseus/core"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "@colyseus/ws-transport"
        update-types:
          - "version-update:semver-minor"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:00"
      timezone: "Europe/Belgrade"
    rebase-strategy: "disabled"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 1

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:00"
      timezone: "Europe/Belgrade"
    rebase-strategy: "disabled"
    groups:
      docker-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 1
