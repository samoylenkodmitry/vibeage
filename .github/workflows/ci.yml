name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Heavy checks run on a nightly schedule — see `nightly-checks`
  # below. 03:00 UTC ≈ 05:00 Belgrade summer, off-peak for the
  # developer machine + GH Actions queue.
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

concurrency:
  # PR runs are cancellable — a new push to the same PR branch
  # should kill the old run so we don't burn CI minutes on a SHA
  # the author already replaced. Main pushes still queue (one fast
  # run per merge). Nightly runs share the group but use a distinct
  # ref so they don't cancel a merge-time run.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fast feedback for PRs — source-only checks that finish in ~3 minutes.
  # Anything that requires Docker, Playwright, or starts a real server
  # lives in the post-merge job below so PRs aren't blocked by 10-minute
  # cycles.
  pr-checks:
    name: PR checks (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Secret scan
        run: docker run --rm -v "${PWD}:/repo" zricethezav/gitleaks:v8.30.1 detect --source=/repo --no-git --redact --verbose

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Typecheck packages (strict)
        run: pnpm run typecheck:packages

      - name: Validate deployment scripts
        run: pnpm run check:scripts

      - name: Maintainability gate
        run: pnpm run check:maintainability

      - name: Engine-abstraction gate
        run: pnpm run check:engine-abstraction

      - name: Content validation
        run: pnpm run content:check

      - name: Content graph
        run: pnpm run content:graph

      - name: Content audit (unlinked snapshot)
        run: pnpm run content:audit:check

      - name: Test
        run: pnpm test

  # Heavy checks: Docker builds, dead-code analysis, perf smoke, browser
  # e2e. Run only nightly (and on-demand via workflow_dispatch). Were
  # previously gated on every merge; moved off the merge path so PRs
  # ship without blocking on a 10-minute job that mostly catches drift.
  # A failure here surfaces in the next morning's run and gets fixed
  # before the rest of the day's PRs pile on top of it. Locally, the
  # developer machine no longer runs these as part of `pnpm run check`
  # — use `pnpm run check:heavy` explicitly when investigating.
  nightly-checks:
    name: Nightly checks (heavy)
    runs-on: ubuntu-latest
    # Dead-code gate + docker build + full frontend build + perf smoke. The
    # Playwright e2e suite moved to the dedicated sharded `e2e-smoke` job below
    # (it dominated wall-time and is independent of these build artifacts).
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dead-code gate
        run: pnpm run check:deadcode

      - name: Build server
        run: pnpm run build:server

      - name: Build game Docker image
        run: docker compose build game

      - name: Build frontend
        run: pnpm run build

      - name: Performance budget smoke
        run: BASELINE_START_LOCAL=1 BASELINE_ENFORCE=1 BASELINE_SKIP_BROWSER_FPS=1 pnpm run measure:baseline

  # Browser e2e smoke — the Playwright suite against a real Vite dev server +
  # game server (persistence off). SHARDED across parallel jobs: each shard
  # starts its OWN servers (an isolated world, so concurrent tests can't steal
  # each other's enemies) and runs ~1/3 of the specs serially. This keeps the
  # whole suite under ~12 min wall-clock instead of ~30+ serial.
  #
  # Headless CI has no GPU, so Chromium renders WebGL via SwiftShader; the e2e
  # helper (tests/e2e-helpers/gameClient.ts) pins the lowest graphics tier so
  # the software renderer doesn't crash on world mount. Nightly/dispatch only.
  e2e-smoke:
    name: Browser smoke (e2e ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser smoke (shard ${{ matrix.shard }}/3)
        run: pnpm run test:e2e -- --shard=${{ matrix.shard }}/3

      # Archwork item #1 follow-up — when the browser smoke fails, the
      # Playwright trace.zip / error-context.md per failing test is the
      # only way to triage without standing up Chromium locally. The
      # workflow previously dropped them on the runner and they
      # disappeared with it. Upload on failure only so green runs stay
      # cheap.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}-shard${{ matrix.shard }}
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
          retention-days: 14
