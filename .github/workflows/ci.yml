name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Secret scan
        run: docker run --rm -v "${PWD}:/repo" zricethezav/gitleaks:v8.30.1 detect --source=/repo --no-git --redact --verbose

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Validate deployment scripts
        run: pnpm run check:scripts

      - name: Maintainability gate
        run: pnpm run check:maintainability

      - name: Test
        run: pnpm test

      - name: Build server
        run: pnpm run build:server

      - name: Build game Docker image
        run: docker compose build game

      - name: Build frontend
        run: pnpm run build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser smoke
        run: pnpm run test:e2e
