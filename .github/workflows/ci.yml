name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback for PRs — source-only checks that finish in ~3 minutes.
  # Anything that requires Docker, Playwright, or starts a real server
  # lives in the post-merge job below so PRs aren't blocked by 10-minute
  # cycles.
  pr-checks:
    name: PR checks (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Secret scan
        run: docker run --rm -v "${PWD}:/repo" zricethezav/gitleaks:v8.30.1 detect --source=/repo --no-git --redact --verbose

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Typecheck packages (strict)
        run: pnpm run typecheck:packages

      - name: Validate deployment scripts
        run: pnpm run check:scripts

      - name: Maintainability gate
        run: pnpm run check:maintainability

      - name: Content validation
        run: pnpm run content:check

      - name: Content graph
        run: pnpm run content:graph

      - name: Content audit (unlinked snapshot)
        run: pnpm run content:audit:check

      - name: Test
        run: pnpm test

  # Heavy checks: Docker builds, dead-code analysis, perf smoke, browser
  # e2e. Run only on pushes to main so PRs stay fast; a failure here
  # blocks the next deploy rather than the PR itself.
  post-merge-checks:
    name: Post-merge checks (heavy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dead-code gate
        run: pnpm run check:deadcode

      - name: Build server
        run: pnpm run build:server

      - name: Build game Docker image
        run: docker compose build game

      - name: Build frontend
        run: pnpm run build

      - name: Performance budget smoke
        run: BASELINE_START_LOCAL=1 BASELINE_ENFORCE=1 BASELINE_SKIP_BROWSER_FPS=1 pnpm run measure:baseline

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser smoke
        run: pnpm run test:e2e
