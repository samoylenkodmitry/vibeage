name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Resolve deployment ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Check deployment secrets
        id: deploy_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Deployment secrets are not configured; skipping VPS deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: ${{ steps.deploy_secrets.outputs.configured == 'true' }}
        env:
          DEPLOY_ROOT: ${{ secrets.VPS_DEPLOY_ROOT }}
          DEPLOY_SHA: ${{ steps.ref.outputs.sha }}
          DOMAIN: ${{ secrets.VPS_DOMAIN }}
          FRONTEND_PUBLIC_DIR: ${{ secrets.VPS_FRONTEND_PUBLIC_DIR }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -Eeuo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          key_file="$RUNNER_TEMP/vps_key"
          printf '%s\n' "$VPS_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          port="${VPS_PORT:-22}"
          deploy_root="${DEPLOY_ROOT:-}"
          domain="${DOMAIN:-vibeage.eu}"
          frontend_public_dir="${FRONTEND_PUBLIC_DIR:-/opt/vibeage-frontend/out}"

          ssh-keyscan -p "$port" "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -i "$key_file" -p "$port" "$VPS_USER@$VPS_HOST" \
            "DEPLOY_ROOT='$deploy_root' DEPLOY_SHA='$DEPLOY_SHA' DOMAIN='$domain' FRONTEND_PUBLIC_DIR='$frontend_public_dir' REPO_URL='$REPO_URL' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          deploy_root=${DEPLOY_ROOT:-$HOME/vibeage-deploy}
          repo_dir="$deploy_root/repo"

          mkdir -p "$deploy_root"

          if [ ! -d "$repo_dir/.git" ]; then
            git clone "$REPO_URL" "$repo_dir"
          fi

          cd "$repo_dir"
          git fetch --prune origin main
          git checkout main
          git reset --hard "$DEPLOY_SHA"

          DOMAIN="$DOMAIN" FRONTEND_PUBLIC_DIR="$FRONTEND_PUBLIC_DIR" bash scripts/deploy-production.sh
          REMOTE
