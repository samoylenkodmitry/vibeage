<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- nginx serves index.html without a Cache-Control header, so a
         lot of browsers cache it heuristically and end up holding the
         <script src=...> for an old hashed bundle even after a deploy.
         These meta directives ask the browser to revalidate every
         load. Hashed asset bundles can still cache forever. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>VibeAge</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
